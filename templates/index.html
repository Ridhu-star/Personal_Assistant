<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Control</title>
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        
        html, body {
            /* This ensures the root elements don't over-expand */
            height: 100%;
        }

        body { 
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            
            /* The WhatsApp Fix: */
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Dynamic height that respects in-app browser menus */
            
            display: flex; flex-direction: column;
            overflow: hidden; transition: background 2s ease;
        }

        /* Dynamic Gradient Background */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(60px); opacity: 0.5;
            background: linear-gradient(45deg, #0f0f0f, #001a1a, #1a0000);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- MOBILE FIXED HEADER --- */
        header {
            padding: 15px 25px; /* Slightly reduced padding to save space */
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); 
            display: flex; 
            flex-wrap: wrap; /* This prevents squishing */
            justify-content: space-between; 
            align-items: center;
            gap: 15px; /* Adds space if elements wrap */
        }

        .header-title { font-weight: 200; letter-spacing: 2px; }

        .header-controls { display: flex; gap: 10px; flex-wrap: wrap; }

        /* Media query specifically for phone screens */
        @media (max-width: 480px) {
            header { flex-direction: column; align-items: flex-start; padding: 15px; }
            .header-controls { width: 100%; justify-content: space-between; }
            select { flex: 1; /* Makes dropdowns stretch evenly on mobile */ }
        }
        /* --------------------------- */

        #chat-flow { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .bubble { 
            max-width: 80%; padding: 15px 22px; border-radius: 20px; 
            font-size: 1rem; line-height: 1.5; backdrop-filter: blur(10px);
        }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); }
        .bot { align-self: flex-start; background: var(--glass); border: 1px solid var(--accent); color: var(--accent); }

        /* Futuristic Input Dock */
        .input-dock { 
            padding: 30px; display: flex; align-items: center; gap: 15px; 
            background: linear-gradient(transparent, #000);
        }

        .input-box {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 15px; display: flex; align-items: center; padding-right: 10px;
        }

        input { 
            width: 100%; background: transparent; border: none; padding: 15px 20px; 
            color: #fff; outline: none; font-size: 1rem;
        }

        .icon-btn { 
            background: transparent; border: none; cursor: pointer; padding: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        .icon-svg { width: 28px; height: 28px; fill: var(--accent); }
        .mic-active { fill: #ff4444 !important; filter: drop-shadow(0 0 10px #ff4444); }
        
        select { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>

<header>
    <div class="header-title">CORE INTERFACE</div>
    <div class="header-controls">
        <select id="lang"><option value="en-IN">EN</option><option value="ta-IN">TA</option></select>
        <select id="gender"><option value="male">MALE</option><option value="female">FEMALE</option></select>
    </div>
</header>

<div id="chat-flow"></div>

<div class="input-dock">
    <div class="input-box">
        <input type="text" id="textIn" placeholder="Enter message..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="icon-btn" onclick="sendMsg()">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <button class="icon-btn" id="micBtn" onclick="startVoice()">
        <svg class="icon-svg" id="micIcon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    const bg = document.getElementById('dynamic-bg');
    const synth = window.speechSynthesis;
    let recognition;

    function addBubble(text, isUser) {
        const div = document.createElement('div');
        div.className = `bubble ${isUser ? 'user' : 'bot'}`;
        div.innerText = text;
        flow.appendChild(div);
        flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
    }

    async function sendMsg() {
        const input = document.getElementById('textIn');
        if(!input.value) return;
        const msg = input.value;
        input.value = '';
        addBubble(msg, true);
        process(msg);
    }

    function startVoice() {
        if (!recognition) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = document.getElementById('lang').value;
            
            recognition.onstart = () => {
                document.getElementById('micIcon').classList.add('mic-active');
                bg.style.background = "linear-gradient(45deg, #2b0000, #440000, #000)";
            };
            
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                addBubble(text, true);
                process(text);
            };
            
            recognition.onend = () => {
                document.getElementById('micIcon').classList.remove('mic-active');
                bg.style.background = "linear-gradient(45deg, #0f0f0f, #001a1a, #1a0000)";
                recognition = null;
            };
            recognition.start();
        }
    }

    async function process(text) {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text })
        });
        const data = await response.json();
        addBubble(data.reply, false);
        speak(data.reply);
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const mode = document.getElementById('gender').value;
        const voices = synth.getVoices();

        if (mode === 'male') {
            utterance.voice = voices.find(v => v.name.includes('Male') || v.name.includes('David')) || voices[0];
            utterance.pitch = 1.0; 
            utterance.rate = 1.0;
        } else {
            utterance.voice = voices.find(v => v.name.includes('Female') || v.name.includes('Zira')) || voices[0];
            utterance.pitch = 1.0;
            utterance.rate = 1.0;
        }

        if(/[\u0B80-\u0BFF]/.test(text)) utterance.lang = 'ta-IN';
        synth.speak(utterance);
    }
    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>
</body>
</html>
