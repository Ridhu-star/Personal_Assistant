<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. TERMINAL</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-glass: rgba(15, 15, 15, 0.85);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        header {
            padding: 20px;
            background: var(--dark-glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--border-glow);
        }

        .status-dot {
            width: 10px; height: 10px;
            background: var(--neon-blue);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        select {
            background: #222;
            color: var(--neon-blue);
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        /* Chat History */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
        }

        .bubble {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .user {
            align-self: flex-end;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-bottom-right-radius: 2px;
            color: var(--neon-blue);
        }

        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
        }

        /* Floating Mic Button */
        .footer {
            padding: 30px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, #000);
        }

        .mic-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--border-glow);
            transition: all 0.3s ease;
        }

        .mic-btn:hover { background: rgba(0, 242, 255, 0.1); }
        
        .pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            background: rgba(255, 50, 50, 0.2) !important;
            border-color: #ff3232 !important;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 50, 50, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 50, 50, 0); }
            100% { transform: scale(1); }
        }

        .mic-icon { fill: var(--neon-blue); width: 35px; }
    </style>
</head>
<body>

<header>
    <div><span class="status-dot"></span><span style="letter-spacing: 2px; font-size: 0.8rem; color: #888;">SYSTEM ONLINE</span></div>
    <select id="voiceMode">
        <option value="male">J.A.R.V.I.S. (M)</option>
        <option value="female">FRIDAY (F)</option>
    </select>
</header>

<div id="chat-window">
    <div class="bubble bot">Systems stabilized. How can I assist with your ECE projects today, Ridhu?</div>
</div>

<div class="footer">
    <button class="mic-btn" id="micBtn" onclick="startJarvis()">
        <svg class="mic-icon" id="micSvg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const synth = window.speechSynthesis;

    function addBubble(text, isUser) {
        const div = document.createElement('div');
        div.className = `bubble ${isUser ? 'user' : 'bot'}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    async function startJarvis() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            document.getElementById('micBtn').classList.add('pulse');
            document.getElementById('micSvg').style.fill = "#ff3232";
        };
        
        recognition.onresult = async (event) => {
            document.getElementById('micBtn').classList.remove('pulse');
            document.getElementById('micSvg').style.fill = "var(--neon-blue)";
            
            const transcript = event.results[0][0].transcript;
            addBubble(transcript, true);

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: transcript })
            });

            const data = await response.json();
            addBubble(data.reply, false);
            speak(data.reply);
        };

        recognition.start();
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const mode = document.getElementById('voiceMode').value;
        const voices = synth.getVoices();

        if (mode === 'male') {
            // Force a deep voice by lowering pitch and rate significantly
            utterance.pitch = 0.5; // Very deep
            utterance.rate = 0.85; // Slower, authoritative
            utterance.voice = voices.find(v => v.name.includes('Male') || v.name.includes('Guy') || v.name.includes('Microsoft David')) || voices[0];
        } else {
            utterance.pitch = 1.3; // Higher
            utterance.rate = 1.0; 
            utterance.voice = voices.find(v => v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Google US English')) || voices[0];
        }
        synth.speak(utterance);
    }

    // Chrome hack: Voices aren't loaded immediately
    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>

</body>
</html>
