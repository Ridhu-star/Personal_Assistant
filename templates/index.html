<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. 2.0</title>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --user-msg: #1a1a1a; --bot-msg: #002b2e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Voice Toggle */
        header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        select { background: #222; color: var(--accent); border: 1px solid var(--accent); padding: 5px; border-radius: 5px; }

        /* Chat History Window */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: var(--bot-msg); border: 1px solid #004d4d; border-bottom-left-radius: 2px; }

        /* Controls */
        .controls { padding: 20px; display: flex; justify-content: center; background: #0a0a0a; }
        .mic-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; box-shadow: 0 0 15px var(--accent); transition: 0.3s; }
        .mic-btn:active { transform: scale(0.9); }
        .pulse { animation: pulse-red 1.5s infinite; background: #ff4444 !important; box-shadow: 0 0 15px #ff4444 !important; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <header>
        <span style="color: var(--accent); font-weight: bold;">J.A.R.V.I.S. Online</span>
        <select id="voiceSelect">
            <option value="male">Male Voice</option>
            <option value="female">Female Voice</option>
        </select>
    </header>

    <div id="chat-container">
        <div class="msg bot">Hello Ridhu. Ready for some ECE innovation?</div>
    </div>

    <div class="controls">
        <button class="mic-btn" id="micBtn" onclick="startJarvis()">🎤</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const synth = window.speechSynthesis;

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'bot'}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';

            recognition.onstart = () => document.getElementById('micBtn').classList.add('pulse');
            
            recognition.onresult = async (event) => {
                document.getElementById('micBtn').classList.remove('pulse');
                const transcript = event.results[0][0].transcript;
                addMessage(transcript, true);

                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: transcript })
                });

                const data = await response.json();
                addMessage(data.reply, false);
                speak(data.reply);
            };

            recognition.start();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            const mode = document.getElementById('voiceSelect').value;

            // Simple logic to find a voice based on gender
            if (mode === 'female') {
                utterance.voice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Female')) || voices[0];
                utterance.pitch = 1.2;
            } else {
                utterance.voice = voices.find(v => v.name.includes('Male') || v.name.includes('Guy')) || voices[1];
                utterance.pitch = 0.8;
            }
            synth.speak(utterance);
        }
    </script>
</body>
</html>
