<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 1.5s ease;
            overflow: hidden;
        }

        /* Animated Background Gradients */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* Top Controls */
        nav {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .status-pill {
            font-size: 0.7rem; letter-spacing: 2px;
            padding: 5px 15px; border-radius: 20px;
            border: 1px solid var(--accent); color: var(--accent);
            text-transform: uppercase;
        }

        #voice-select {
            background: rgba(0,0,0,0.5); color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px; border-radius: 10px; outline: none;
        }

        /* Conversation Thread */
        #chat-flow {
            flex: 1; overflow-y: auto;
            padding: 30px; display: flex; flex-direction: column; gap: 25px;
            scrollbar-width: none;
        }

        .bubble {
            max-width: 75%; padding: 18px 24px;
            border-radius: 24px; font-size: 1rem;
            line-height: 1.6; backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .user-node {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom-right-radius: 4px;
        }

        .ai-node {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-bottom-left-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* The Pulse Core */
        .interaction-zone {
            height: 180px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(transparent, rgba(0,242,255,0.05));
        }

        .orb-wrapper {
            position: relative; width: 90px; height: 90px;
            cursor: pointer;
        }

        .orb {
            width: 100%; height: 100%; border-radius: 50%;
            background: #fff; box-shadow: 0 0 30px #fff;
            transition: all 0.5s ease;
            display: flex; align-items: center; justify-content: center;
        }

        .listening .orb {
            background: #ff3e3e; box-shadow: 0 0 50px #ff3e3e;
            transform: scale(1.1);
        }

        .thinking .orb {
            background: var(--accent); box-shadow: 0 0 50px var(--accent);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate { 0% { border-radius: 50%; } 50% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 100% { border-radius: 50%; } }
    </style>
</head>
<body>

<div class="bg-layer" id="bg"></div>

<nav>
    <div class="status-pill" id="status">Ready</div>
    <select id="voice-select">
        <option value="male">System: Deep Alpha</option>
        <option value="female">System: Soft Beta</option>
    </select>
</nav>

<div id="chat-flow"></div>

<div class="interaction-zone">
    <div class="orb-wrapper" onclick="engage()">
        <div class="orb" id="orb">
            <svg id="mic-icon" width="30" height="30" viewBox="0 0 24 24" fill="black"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    const orb = document.getElementById('orb');
    const bg = document.getElementById('bg');
    const status = document.getElementById('status');
    const synth = window.speechSynthesis;

    function addNode(text, isUser) {
        const div = document.createElement('div');
        div.className = `bubble ${isUser ? 'user-node' : 'ai-node'}`;
        div.innerText = text;
        flow.appendChild(div);
        flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
    }

    async function engage() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-IN'; // Optimized for Indian English/Tamil accents

        recognition.onstart = () => {
            document.body.classList.add('listening');
            status.innerText = "Listening...";
            bg.style.background = "radial-gradient(circle at center, #2b0000 0%, #000 100%)";
        };

        recognition.onresult = async (event) => {
            document.body.classList.remove('listening');
            orb.parentElement.classList.add('thinking');
            status.innerText = "Thinking...";
            bg.style.background = "radial-gradient(circle at center, #001a1a 0%, #000 100%)";

            const transcript = event.results[0][0].transcript;
            addNode(transcript, true);

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: transcript })
            });

            const data = await response.json();
            orb.parentElement.classList.remove('thinking');
            status.innerText = "Speaking";
            bg.style.background = "radial-gradient(circle at center, #1a1a1a 0%, #000 100%)";
            
            addNode(data.reply, false);
            speak(data.reply);
        };
        recognition.start();
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const mode = document.getElementById('voice-select').value;
        const voices = synth.getVoices();

        // Advanced Voice Tuning
        if (mode === 'male') {
            // Find a natural male voice if available
            const maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'));
            utterance.voice = maleVoice;
            utterance.pitch = 0.65; // Deep but clear
            utterance.rate = 0.95;
        } else {
            const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Google US English'));
            utterance.voice = femaleVoice;
            utterance.pitch = 1.1; 
            utterance.rate = 1.0;
        }
        
        // Auto-Tamil Support
        if (/[\u0B80-\u0BFF]/.test(text)) utterance.lang = 'ta-IN';
        
        synth.speak(utterance);
        utterance.onend = () => { status.innerText = "Ready"; };
    }

    // Pre-load voices
    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>
</body>
</html>
