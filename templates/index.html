<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interface</title>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column; transition: 1s;
        }
        
        /* Dynamic Glow Background */
        #glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; transition: 1.5s; }

        header { 
            padding: 20px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; 
        }

        #chat-flow { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .node { max-width: 80%; padding: 15px 22px; border-radius: 20px; line-height: 1.5; backdrop-filter: blur(5px); }
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon); }
        .ai { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); }

        /* Multi-Modal Input Dock */
        .dock { 
            padding: 25px; background: rgba(10, 10, 10, 0.9); border-top: 1px solid #222;
            display: flex; align-items: center; gap: 12px;
        }

        input { 
            flex: 1; background: #111; border: 1px solid #333; padding: 14px; 
            border-radius: 12px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); }

        .btn { 
            background: none; border: 1px solid #444; color: #fff; padding: 12px; 
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .mic-on { color: #ff0055 !important; border-color: #ff0055 !important; box-shadow: 0 0 15px #ff0055; }
        
        select { background: #000; color: var(--neon); border: 1px solid #333; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="glow"></div>
    <header>
        <div style="font-size: 0.7rem; letter-spacing: 3px;">SYSTEM ACTIVE</div>
        <div>
            <select id="lang">
                <option value="en-IN">English</option>
                <option value="ta-IN">Tamil</option>
            </select>
            <select id="gender">
                <option value="male">Protocol: M</option>
                <option value="female">Protocol: F</option>
            </select>
        </div>
    </header>

    <div id="chat-flow"></div>

    <div class="dock">
        <input type="text" id="textIn" placeholder="Type command..." onkeypress="if(event.key==='Enter') transmitText()">
        <button id="mic" onclick="toggleMic()">🎤</button>
        <button onclick="transmitText()">➤</button>
    </div>

<script>
    const flow = document.getElementById('chat-flow');
    const glow = document.getElementById('glow');
    const synth = window.speechSynthesis;
    let recognition;

    function addNode(text, isUser) {
        const div = document.createElement('div');
        div.className = `node ${isUser ? 'user' : 'ai'}`;
        div.innerText = text;
        flow.appendChild(div);
        flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
    }

    // Text Transmission
    async function transmitText() {
        const input = document.getElementById('textIn');
        if(!input.value) return;
        const msg = input.value;
        input.value = '';
        addNode(msg, true);
        process(msg);
    }

    // High-Accuracy Voice Transmission
    function toggleMic() {
        if (!recognition) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = document.getElementById('lang').value;
            
            recognition.onstart = () => {
                document.getElementById('mic').classList.add('mic-on');
                glow.style.background = "radial-gradient(circle, #330000 0%, #000 100%)";
            };
            
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                addNode(text, true);
                process(text);
            };
            
            recognition.onend = () => {
                document.getElementById('mic').classList.remove('mic-on');
                glow.style.background = "none";
                recognition = null;
            };
            recognition.start();
        }
    }

    async function process(text) {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text })
        });
        const data = await response.json();
        addNode(data.reply, false);
        speak(data.reply);
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        const mode = document.getElementById('gender').value;

        if (mode === 'male') {
            // Find deep male voice or apply frequency shift
            utterance.voice = voices.find(v => v.name.includes('David') || v.name.includes('Google UK English Male')) || voices[0];
            utterance.pitch = 0.5; // Deep resonance
            utterance.rate = 0.9;
        } else {
            utterance.voice = voices.find(v => v.name.includes('Female') || v.name.includes('Google US English')) || voices[0];
            utterance.pitch = 1.1;
            utterance.rate = 1.0;
        }

        if(/[\u0B80-\u0BFF]/.test(text)) utterance.lang = 'ta-IN';
        synth.speak(utterance);
    }
    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>
</body>
</html>
